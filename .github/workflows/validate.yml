name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ruff mypy pip-audit homeassistant elli-client

      - name: ruff check
        run: ruff check .

      - name: ruff format
        run: ruff format --check .

      - name: mypy
        run: mypy custom_components/

      - name: pip-audit
        run: |
          python -c "
          import json
          reqs = json.load(open('custom_components/elli_charger_ha/manifest.json'))['requirements']
          open('_reqs_tmp.txt', 'w').write('\n'.join(reqs))
          "
          pip-audit -r _reqs_tmp.txt
          rm _reqs_tmp.txt
